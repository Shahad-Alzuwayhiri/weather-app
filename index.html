<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather app </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter City Name " spellcheck="false">
            <button> <img src="image/search.png"> </button>
        </div>
        <div class="error">
            <p>Invalid City Name</p>
        </div>
        <div class="weather">
            <img src="image/weather icons/clear.svg" class="weather-icon">
            <h1 class="temp">41°C</h1>
            <h2 class="City">Makkah</h2>
            <div class="details">
                <div class="col">
                    <img src="image/weather icons/Humidity.gif">
                    <div>
                        <p class="humidity">17%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="image/weather icons/wind.svg">
                    <div>
                        <p class="wind">14 </p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="config.js"></script>

    <script>
        const apiUrl = "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

        const searchBox = document.querySelector(".search input");
        const searchBtn = document.querySelector(".search button");
        const weatherIcon = document.querySelector(".weather-icon")
        async function CheckWeather(City) {
            const response = await fetch(apiUrl + City + `&appid=${apiKey}`);

            if (response.status == 404) {
                document.querySelector(".error").style.display = "block";
                document.querySelector(".weather").style.display = "none";
            } else {
                var data = await response.json();
                    

                document.querySelector(".City").innerHTML = data.name;
                document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°C";
                document.querySelector(".humidity").innerHTML = data.main.humidity + "%";
                document.querySelector(".wind").innerHTML = data.wind.speed + "km/h";

                if (data.weather[0].main == "Clouds") {
                    weatherIcon.src = "image/weather icons/cloudy.svg";

                } else if (data.weather[0].main == "Clear") {
                    weatherIcon.src = "image/weather icons/clear.svg";

                } else if (data.weather[0].main == "Rain") {
                    weatherIcon.src = "image/weather icons/rainy.svg";

                } else if (data.weather[0].main == "Drizzle") {
                    weatherIcon.src = "image/weather icons/rainy.svg";

                } else if (data.weather[0].main == "Thunderstorm") {
                    weatherIcon.src = "image/weather icons/isolated-thunderstorms.svg";

                } else if (data.weather[0].main == "Snow") {
                    weatherIcon.src = "image/weather icons/snowy.svg";

                } else if (data.weather[0].main == "Mist") {
                    weatherIcon.src = "image/weather icons/fog.svg";

                } else if (data.weather[0].main == "Fog") {
                    weatherIcon.src = "image/weather icons/fog.svg";

                } else if (data.weather[0].main == "Haze") {
                    weatherIcon.src = "image/weather icons/haze.svg";

                } else if (data.weather[0].main == "Dust") {
                    weatherIcon.src = "image/weather icons/dust.svg";

                } else if (data.weather[0].main == "Smoke") {
                    weatherIcon.src = "image/weather icons/haze.svg";

                } else if (data.weather[0].main == "Sand") {
                    weatherIcon.src = "image/weather icons/dust.svg";

                } else if (data.weather[0].main == "Ash") {
                    weatherIcon.src = "image/weather icons/dust.svg";

                } else if (data.weather[0].main == "Squall") {
                    weatherIcon.src = "image/weather icons/wind.svg";

                } else if (data.weather[0].main == "Tornado") {
                    weatherIcon.src = "image/weather icons/tornado.svg";
                }

                document.querySelector(".weather").style.display = "block";
                document.querySelector(".error").style.display = "none";
            }
        }



        searchBtn.addEventListener("click", () => {
            CheckWeather(searchBox.value);
        });

    </script>
</body>

</html>
